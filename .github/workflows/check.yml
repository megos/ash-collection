name: check
on:
  - pull_request
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - run: corepack enable
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
    - run: yarn --immutable
    - name: lint
      run: yarn lint:ci
    - name: build
      run: yarn build
